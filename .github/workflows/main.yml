name: Gerar APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar ferramentas de compilacao do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache cmake git libffi-dev libssl-dev python3-dev zip unzip lld libncurses-dev autoconf libtool pkg-config zlib1g-dev gawk patch
          pip3 install --upgrade pip setuptools wheel virtualenv "cython<3.0" buildozer --break-system-packages

      - name: Compilar APK com Buildozer (Modo Verbose)
        run: |
          yes | buildozer -v android debug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-debug
          path: bin/*.apk
          
