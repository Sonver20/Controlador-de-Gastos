name: Gerar APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório para a máquina virtual
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      # 2. Configura o Java 17
      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configura o Python 3.11
      - name: Configurar Python Estavel (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Instala dependências do Linux
      - name: Instalar ferramentas de compilacao do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache cmake git libffi-dev libssl-dev zip unzip lld libncurses-dev autoconf automake libtool libltdl-dev pkg-config zlib1g-dev gawk patch libsqlite3-dev libbz2-dev gettext

      # 5. Garante que não há cache corrompido de compilações anteriores
      - name: Limpar cache antigo do Buildozer
        run: rm -rf .buildozer

      # 6. Instala o Buildozer e o Cython
      - name: Instalar Buildozer Estável
        run: |
          pip install --upgrade pip setuptools wheel virtualenv "cython<=3.0.12"
          pip install buildozer

      # 7. Compila o APK (A pasta .buildozer é criada AQUI)
      - name: Compilar APK com Buildozer (Modo Verbose)
        env:
          CFLAGS: "-Wno-error=incompatible-pointer-types"
        run: |
          yes | buildozer -v android debug

      # 8. EXIBE O MANIFESTO (Executado IMEDIATAMENTE após a compilação)
      - name: Inspecionar AndroidManifest.xml gerado
        run: |
          find .buildozer -name "AndroidManifest.xml" -exec cat {} +

      # 9. Disponibiliza o APK gerado para download
      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-debug
          path: bin/*.apk
          
