name: Gerar APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python Estavel (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ferramentas de compilacao do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache cmake git libffi-dev libssl-dev zip unzip lld libncurses-dev autoconf automake libtool libltdl-dev pkg-config zlib1g-dev gawk patch libsqlite3-dev libbz2-dev gettext

      - name: Limpar cache antigo do Buildozer
        run: rm -rf .buildozer

      - name: Instalar Buildozer Estável
        run: |
          pip install --upgrade pip setuptools wheel virtualenv "cython<=3.0.12"
          pip install buildozer

      - name: Injetar servico no template do python-for-android
        run: |
          python3 -c '
          import glob, os, site

          service_xml = """
          <service android:name="org.exemplo.gastosteste.NotificationReceiver"
                   android:label="Meu App de Gastos"
                   android:permission="android.permission.BIND_NOTIFICATION_LISTENER_SERVICE"
                   android:exported="true">
              <intent-filter>
                  <action android:name="android.service.notification.NotificationListenerService" />
              </intent-filter>
          </service>
          """

          search_paths = site.getsitepackages() + [os.path.expanduser("~")]
          found = False
          for sp in search_paths:
              pattern = os.path.join(sp, "**/pythonforandroid/**/AndroidManifest.tmpl.xml")
              for file_path in glob.glob(pattern, recursive=True):
                  with open(file_path, "r") as f:
                      content = f.read()
                  if "</application>" in content and "NotificationReceiver" not in content:
                      new_content = content.replace("</application>", f"{service_xml}\n</application>")
                      with open(file_path, "w") as f:
                          f.write(new_content)
                      print(f"✅ SERVIÇO INJETADO COM SUCESSO EM: {file_path}")
                      found = True
          if not found:
              print("⚠️ ALERTA: Nenhum arquivo AndroidManifest.tmpl.xml foi localizado para injetar!")
          '

      - name: Compilar APK com Buildozer (Modo Verbose)
        env:
          CFLAGS: "-Wno-error=incompatible-pointer-types"
        run: |
          yes | buildozer -v android debug

      # FILTRO CORRIGIDO: Inspeciona APENAS o manifesto final da pasta dists
      - name: Inspecionar AndroidManifest.xml FINAL do App
        run: |
          find .buildozer -path "*/dists/*" -name "AndroidManifest.xml" -exec cat {} +

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-debug
          path: bin/*.apk
          
